name: Daily Cybersecurity News

on:
  schedule:
    # Run daily at 5:00 AM UTC (8:00 AM Egypt time, accounting for summer time)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch latest cybersecurity news
        run: node scripts/fetch-news.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/dailyNews.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit new articles
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "JoeScan Bot"
          git config user.email "bot@joescan.me"
          git add src/data/dailyNews.json
          git commit -m "🤖 auto: daily cybersecurity news update"
          git push

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm install --legacy-peer-deps

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        run: npm run build
        env:
          NODE_ENV: production

      - name: Copy index.html to 404.html (SPA routing)
        if: steps.changes.outputs.changed == 'true'
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        if: steps.changes.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
