<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Primary SEO -->
    <title>JoeScan — AI Cybersecurity & OSINT Intelligence Platform</title>
    <meta name="description" content="Professional AI-powered OSINT platform. Scan emails, passwords, phones, IPs, domains, and usernames for data breaches, dark web exposure, and cyber threats. Enterprise-grade security intelligence." />

    <meta name="author" content="JoeTech" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="JoeScan — Know Your Exposure" />
    <meta property="og:description" content="AI-powered cybersecurity scanner. Check emails, passwords, phones, and more for data breaches and dark web exposure." />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="JoeScan — AI Cybersecurity Platform" />

    <meta name="twitter:image" content="/icon-512.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-512.png" />

    <meta name="theme-color" content="#00ff88" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JoeScan" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
